<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KatOS Terminal</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js" integrity="sha512-aNMyYYxdIxIaot0Y1/PLuEu3eipGCmsEUbrsVLOgFGJolw6mOQzzlYx+wvX5R1yPLF/bJX6XoUu0Yp/5NQ0Y9A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  </head>
  <body>
    <div id="desktop" class="desktop" aria-label="KatOS Desktop">
      <div id="desktopIcons" class="desktop__icons" aria-label="Desktop icons">
      </div>
      <div id="windowLayer" class="desktop__windows" aria-label="Windows"></div>
      <footer class="taskbar" aria-label="Taskbar">
        <div id="taskbarApps" class="taskbar__apps" aria-label="Running apps"></div>
        <div class="taskbar__clock" aria-label="Clock">KatOS</div>
      </footer>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
